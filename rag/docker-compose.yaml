version: '3.9'
services:
  chromadb:
    # Vector database
    image: chromadb/chroma:0.4.24
    container_name: sia_vector_db
    ports:
      - "8000:8000"
    volumes:
      - ./chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped

