spring:
  application:
    name: sia-booking
  server:
    port: 8080
  datasource:
    url: jdbc:h2:mem:siadb
    driverClassName: org.h2.Driver
    username: sa
    password: password
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  sia:
#    SIA_API_KEY: "sk-sia-12345-secret-key"
    SIA_API_KEY: ${SIA_KEY}
